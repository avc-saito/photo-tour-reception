<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>フォトツアー 受付(QRスキャナー)</title>
<style>
  body { font-family: sans-serif; margin: 0; padding: 16px; }
  h1 { font-size: 18px; }
  #reader { width: 100%; max-width: 400px; margin-bottom: 16px; }
  input[type=text] { width: 100%; box-sizing: border-box; padding: 8px; font-size: 16px; }
  button { padding: 8px 16px; font-size: 16px; margin-top: 8px; }
  table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  th, td { border: 1px solid #ccc; padding: 6px; font-size: 14px; text-align: left; }
  .msg { margin-top: 8px; font-weight: bold; }
</style>
</head>
<body>
  <h1>フォトツアー 受付(QRスキャナー)</h1>

  <button id="startCameraBtn" onclick="startCamera()">QRカメラを起動</button>
  <div id="reader"></div>
  <div>
    <input type="text" id="keyword" placeholder="氏名・ふりがな・受付IDで検索">
    <button onclick="doSearch()">検索</button>
  </div>
  <div id="msg" class="msg"></div>
  <table id="resultTable" style="display:none">
    <thead>
      <tr><th>氏名</th><th>参加回</th><th>ステータス</th><th>来場</th><th>操作</th></tr>
    </thead>
    <tbody id="resultBody"></tbody>
  </table>

  <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
  <script>
    // ==============================
    // ここにデプロイしたGAS WebアプリのURL(.../exec)を貼り付ける
    // ==============================
    const API_URL = "https://script.google.com/macros/s/AKfycbyDfea8IoNgk7WEEjrbom7aJ7Tjzm2wB4vy3w-iUGLbUjCQLnV9Eiw8tXYxvzV83leN/exec";

    // JSONP呼び出し(GAS Webアプリとは別ドメインでもCORSに引っかからないようscriptタグで読み込む)
    function jsonp(url, onResult) {
      const cbName = "jsonp_cb_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

      window[cbName] = function (data) {
        onResult(data);
        delete window[cbName];
        script.remove();
      };

      const script = document.createElement("script");
      script.src = url + (url.indexOf("?") >= 0 ? "&" : "?") + "callback=" + cbName;
      script.onerror = function () {
        document.getElementById("msg").textContent = "通信に失敗しました。API_URLの設定を確認してください。";
        delete window[cbName];
      };
      document.body.appendChild(script);
    }

    function doSearch() {
      const keyword = document.getElementById("keyword").value;
      document.getElementById("msg").textContent = "検索中...";
      const url = API_URL + "?action=search&keyword=" + encodeURIComponent(keyword);
      jsonp(url, showResults);
    }

    function showResults(results) {
      document.getElementById("msg").textContent = results.length + "件見つかりました";
      const tbody = document.getElementById("resultBody");
      tbody.innerHTML = "";

      results.forEach(function (r) {
        const tr = document.createElement("tr");
        tr.innerHTML =
          "<td>" + r.name + "(" + r.kana + ")</td>" +
          "<td>" + r.session + "</td>" +
          "<td>" + r.status + "</td>" +
          "<td>" + (r.arrived ? "済 " + r.arrivedTime : "未") + "</td>" +
          "<td></td>";

        const actionCell = tr.lastElementChild;

        if (r.status === "確定" && !r.arrived) {
          const btn = document.createElement("button");
          btn.textContent = "チェックイン";
          btn.onclick = function () { doCheckIn(r.row, btn); };
          actionCell.appendChild(btn);
        } else if (r.arrived) {
          actionCell.textContent = "済";
        } else {
          actionCell.textContent = "対象外";
        }

        tbody.appendChild(tr);
      });

      document.getElementById("resultTable").style.display = results.length ? "" : "none";
    }

    function doCheckIn(row, btn) {
      btn.disabled = true;
      const url = API_URL + "?action=checkIn&row=" + row;
      jsonp(url, function (res) {
        document.getElementById("msg").textContent = res.message;
        doSearch();
      });
    }

    function onScanSuccess(decodedText) {
      document.getElementById("keyword").value = decodedText;
      doSearch();
    }

    let qrScanner = null;

    function startCamera() {
      document.getElementById("msg").textContent = "カメラを起動しています...";
      document.getElementById("startCameraBtn").disabled = true;

      qrScanner = new Html5Qrcode("reader");
      qrScanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
      ).then(function () {
        document.getElementById("msg").textContent = "カメラ起動しました。QRコードを映してください。";
      }).catch(function (err) {
        document.getElementById("msg").textContent = "カメラ起動失敗: " + err;
        document.getElementById("startCameraBtn").disabled = false;
      });
    }
  </script>
</body>
</html>
